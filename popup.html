<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>京东Cookie提取器</h1>
    <div class="buttons">
      <button id="openJd">打开京东</button>
      <button id="extractCookie">提取Cookie</button>
    </div>
    <div class="result">
      <textarea id="resultText" readonly placeholder="点击"提取Cookie"后结果将在此显示..."></textarea>
      <button id="copyBtn">复制</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
